<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTA Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="map"></div>
    <div id="controls">
        <button onclick="exportMarkers()">Экспорт меток</button>
        <label>Импорт меток<input type="file" id="importFile" accept=".json" onchange="importMarkers(event)"></label>
        <button onclick="clearMarkers()">Очистить все</button>
        <hr>
        <small>Ctrl+Клик — лут собран (5 мин)</small>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase SDK (Compat версия для простоты) -->
    <!-- Firebase SDK (Compat версии) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script src="config.js"></script>
    <script src="map.js"></script>
</body>
</html>
